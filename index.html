<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom mody</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html"><h1>LOGO</h1></a>
        <nav>
            <ul>
                <li><a href="#">Strona główna</a></li>
                <li><a href="#">Mężczyzna</a></li>
                <li><a href="#">Kobieta</a></li>
                <li><a href="#">Dziecko</a></li>
            </ul>
        </nav>
        <section>
            <button onClick="window.location.href='logowanie.html'">Zaloguj</button>
            <button onClick="window.location.href='zarejestruj.html'">Zarejestruj</button>
        </section>
    </header>
    <main>
        <div id="container">
            <section class="product">
                <img src="./asset/nike.jpg" alt="nike" width="150px" height="150px">
                <section class="dane">
                    <div class="nazwa-info">
                        <div class="nazwa">
                        <span class="marka">Nike</span>
                        <span class="model">airmax95</span>
                        </div>
                        <span class="cena">500zl</span>
                    </div>
                    <button class="btn-kup">kup teraz</button>
                </section>
            </section>
            <section class="product">
                <img src="./asset/adidas.jpg" alt="adidas" width="150px" height="150px">
                   <section class="dane">
                    <div class="nazwa-info">
                        <div class="nazwa">
                        <span class="marka">adidas</span>
                        <span class="model">samba</span>
                        </div>
                        <span class="cena">4500zl</span>
                    </div>
                    <button class="btn-kup">kup teraz</button>
                </section>
            </section>
            <section class="product">
                <img src="./asset/wolczanka.jpg" alt="wolczanka" width="150px" height="150px">
                   <section class="dane">
                    <div class="nazwa-info">
                        <div class="nazwa">
                        <span class="marka">wolczanka</span>
                        <span class="model">biala koszula</span>
                        </div>
                        <span class="cena">300zl</span>
                    </div>
                    <button class="btn-kup">kup teraz</button>
                </section>
            </section>
        </div>
     
    </main>
    <footer>
        <p>Wszelkie prawa zastrzeżone</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
